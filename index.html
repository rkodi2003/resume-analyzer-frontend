<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Resume Analyzer</title>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: white;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 22px; font-weight: 700; }
    header p  { font-size: 13px; opacity: 0.7; margin-top: 2px; }

    .main { max-width: 1100px; margin: 32px auto; padding: 0 24px; }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .card h3 {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    textarea {
      width: 100%;
      height: 260px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      outline: none;
      line-height: 1.6;
      transition: border 0.2s;
    }
    textarea:focus { border-color: #4f46e5; }

    .btn-analyze {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-bottom: 28px;
    }
    .btn-analyze:hover { opacity: 0.9; }
    .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }

    .alert-error {
      background: #fed7d7;
      color: #9b2c2c;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    /* Score section */
    .results-top {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .score-card {
      background: white;
      border-radius: 12px;
      padding: 24px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .score-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 800;
      color: white;
      margin-bottom: 12px;
    }

    .verdict-badge {
      display: inline-block;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      margin-top: 8px;
    }

    .summary-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .summary-card h3 { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 10px; }
    .summary-card p  { font-size: 14px; color: #4a5568; line-height: 1.7; }

    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .skill-list { list-style: none; display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .skill-tag {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .skill-matched { background: #c6f6d5; color: #276749; }
    .skill-missing  { background: #fed7d7; color: #9b2c2c; }
    .strength-tag   { background: #ebf4ff; color: #2b6cb0; }

    .suggestions { margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
    .suggestion-item {
      background: #f7f8ff;
      border-left: 3px solid #4f46e5;
      padding: 10px 14px;
      border-radius: 0 8px 8px 0;
    }
    .suggestion-item strong { font-size: 13px; color: #1a1a2e; display: block; margin-bottom: 3px; }
    .suggestion-item span   { font-size: 13px; color: #4a5568; line-height: 1.5; }

    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px;
      gap: 16px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #e2e8f0;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const API = "https://resume-analyzer-h8z0.onrender.com/api/analyze";

function getScoreColor(score) {
  if (score >= 75) return "#38a169";
  if (score >= 50) return "#d69e2e";
  return "#e53e3e";
}

function getVerdictStyle(verdict) {
  const map = {
    "Strong Match": { bg: "#c6f6d5", color: "#276749" },
    "Good Match":   { bg: "#bee3f8", color: "#2c5282" },
    "Partial Match":{ bg: "#fefcbf", color: "#744210" },
    "Weak Match":   { bg: "#fed7d7", color: "#9b2c2c" },
  };
  return map[verdict] || { bg: "#e2e8f0", color: "#2d3748" };
}

function App() {
  const [resumeMode, setResumeMode] = React.useState("text"); // "text" | "pdf"
  const [resume, setResume] = React.useState("");
  const [pdfFile, setPdfFile] = React.useState(null);
  const [jd, setJd] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [result, setResult] = React.useState(null);

  const analyze = async () => {
    setError(null); setResult(null); setLoading(true);
    try {
      let res;
      if (resumeMode === "pdf" && pdfFile) {
        const formData = new FormData();
        formData.append("resume_pdf", pdfFile);
        formData.append("job_description", jd);
        res = await fetch(`${API.replace("/analyze", "/analyze-pdf")}`, {
          method: "POST",
          body: formData,
        });
      } else {
        res = await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ resume, job_description: jd }),
        });
      }
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Something went wrong");
      setResult(data);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  const canSubmit = jd.trim() && (resumeMode === "text" ? resume.trim() : pdfFile);

  return (
    <div>
      <header>
        <div>
          <h1>AI Resume Analyzer</h1>
          <p>Powered by Claude AI — upload or paste your resume and job description</p>
        </div>
      </header>

      <div className="main">
        <div className="input-grid">
          <div className="card">
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"12px"}}>
              <h3 style={{margin:0}}>Your Resume</h3>
              <div style={{display:"flex", gap:"6px"}}>
                <button
                  onClick={() => { setResumeMode("text"); setPdfFile(null); }}
                  style={{
                    padding:"4px 12px", border:"1.5px solid", borderRadius:"20px", cursor:"pointer", fontSize:"12px", fontWeight:600,
                    background: resumeMode==="text" ? "#4f46e5" : "white",
                    color: resumeMode==="text" ? "white" : "#4f46e5",
                    borderColor:"#4f46e5"
                  }}>Paste Text</button>
                <button
                  onClick={() => { setResumeMode("pdf"); setResume(""); }}
                  style={{
                    padding:"4px 12px", border:"1.5px solid", borderRadius:"20px", cursor:"pointer", fontSize:"12px", fontWeight:600,
                    background: resumeMode==="pdf" ? "#4f46e5" : "white",
                    color: resumeMode==="pdf" ? "white" : "#4f46e5",
                    borderColor:"#4f46e5"
                  }}>Upload PDF</button>
              </div>
            </div>

            {resumeMode === "text" ? (
              <textarea
                value={resume}
                onChange={e => setResume(e.target.value)}
                placeholder="Paste your resume text here..."
              />
            ) : (
              <div style={{
                border:"2px dashed #cbd5e0", borderRadius:"8px", height:"260px",
                display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                gap:"12px", cursor:"pointer", background:"#f7f8ff"
              }}
                onClick={() => document.getElementById("pdf-upload").click()}
              >
                <div style={{fontSize:"40px"}}>📄</div>
                <div style={{fontSize:"14px", fontWeight:600, color:"#4f46e5"}}>
                  {pdfFile ? pdfFile.name : "Click to upload PDF"}
                </div>
                <div style={{fontSize:"12px", color:"#718096"}}>Only PDF files supported</div>
                <input
                  id="pdf-upload"
                  type="file"
                  accept=".pdf"
                  style={{display:"none"}}
                  onChange={e => setPdfFile(e.target.files[0] || null)}
                />
              </div>
            )}
          </div>
          <div className="card">
            <h3>Job Description</h3>
            <textarea
              value={jd}
              onChange={e => setJd(e.target.value)}
              placeholder="Paste the job description here..."
            />
          </div>
        </div>

        <button
          className="btn-analyze"
          onClick={analyze}
          disabled={loading || !canSubmit}
        >
          {loading ? "Analyzing..." : "Analyze My Resume"}
        </button>

        {error && <div className="alert-error">{error}</div>}

        {loading && (
          <div className="loader">
            <div className="spinner"/>
            <p style={{color:"#718096", fontSize:"14px"}}>Claude AI is analyzing your resume...</p>
          </div>
        )}

        {result && <Results data={result} />}
      </div>
    </div>
  );
}

function Results({ data }) {
  const color = getScoreColor(data.match_score);
  const vs = getVerdictStyle(data.verdict);

  return (
    <div>
      <div className="results-top">
        <div className="score-card">
          <div className="score-circle" style={{ background: color }}>
            {data.match_score}%
          </div>
          <div style={{fontSize:"14px", fontWeight:700, color:"#2d3748"}}>Match Score</div>
          <div className="verdict-badge" style={{ background: vs.bg, color: vs.color }}>
            {data.verdict}
          </div>
        </div>
        <div className="summary-card">
          <h3>Overall Assessment</h3>
          <p>{data.summary}</p>

          {data.strengths?.length > 0 && (
            <>
              <h3 style={{marginTop:"16px"}}>Strengths</h3>
              <ul className="skill-list">
                {data.strengths.map((s,i) => (
                  <li key={i} className="skill-tag strength-tag">{s}</li>
                ))}
              </ul>
            </>
          )}
        </div>
      </div>

      <div className="results-grid">
        <div className="card">
          <h3>Matched Skills ✅</h3>
          <ul className="skill-list">
            {data.matched_skills?.length > 0
              ? data.matched_skills.map((s,i) => <li key={i} className="skill-tag skill-matched">{s}</li>)
              : <li style={{fontSize:"13px", color:"#718096"}}>No matched skills found</li>
            }
          </ul>
        </div>
        <div className="card">
          <h3>Missing Skills ❌</h3>
          <ul className="skill-list">
            {data.missing_skills?.length > 0
              ? data.missing_skills.map((s,i) => <li key={i} className="skill-tag skill-missing">{s}</li>)
              : <li style={{fontSize:"13px", color:"#718096"}}>No missing skills — great fit!</li>
            }
          </ul>
        </div>
      </div>

      <div className="card">
        <h3>Actionable Suggestions</h3>
        <div className="suggestions">
          {data.suggestions?.map((s,i) => (
            <div key={i} className="suggestion-item">
              <strong>{s.title}</strong>
              <span>{s.detail}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
